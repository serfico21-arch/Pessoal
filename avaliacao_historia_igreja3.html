<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado de História da Igreja 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1929;
    --surface2: #221f35;
    --accent: #e8c96d;
    --accent2: #7c6cfc;
    --green: #4caf82;
    --red: #e05f5f;
    --text: #ede8f5;
    --muted: #9087b0;
    --border: rgba(232,201,109,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 10%, rgba(255,255,255,0.22) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 90%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 30%, rgba(255,255,255,0.18) 0%, transparent 100%),
      radial-gradient(2px 2px at 45% 45%, rgba(232,201,109,0.12) 0%, transparent 100%);
    pointer-events:none;
    z-index:0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 2rem 1.5rem 4rem;
  }

  .top-header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeDown 0.6s ease;
  }
  .top-header .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .top-header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .top-header p { font-size: 13px; color: var(--muted); font-weight: 300; }

  #stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
  }
  .stat-box .num { font-size: 22px; font-weight: 700; }
  .stat-box .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .stat-box.acerto .num { color: var(--green); }
  .stat-box.erro .num { color: var(--red); }

  #progress-wrap {
    margin-bottom: 1.8rem;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .progress-track {
    background: var(--surface2);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  #prog {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .q-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    animation: fadeUp 0.4s ease;
  }
  .round-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(124,108,252,0.15);
    border: 0.5px solid rgba(124,108,252,0.35);
    color: #a99dff;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 1.2rem;
  }
  .q-num { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .q-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: var(--surface2);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Lato', Georgia, serif;
    cursor: pointer;
    text-align: left;
    line-height: 1.5;
    transition: all 0.18s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .opt-btn .letter {
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    margin-top: 1px;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .opt-btn:hover:not(:disabled) {
    background: rgba(124,108,252,0.12);
    border-color: rgba(124,108,252,0.4);
    transform: translateX(3px);
  }
  .opt-btn:hover:not(:disabled) .letter {
    background: rgba(124,108,252,0.25);
    border-color: rgba(124,108,252,0.6);
    color: #c4baff;
  }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct {
    background: rgba(76,175,130,0.15);
    border-color: rgba(76,175,130,0.5);
    color: #a3ddc0;
  }
  .opt-btn.correct .letter { background: rgba(76,175,130,0.3); border-color: var(--green); color: #a3ddc0; }
  .opt-btn.wrong {
    background: rgba(224,95,95,0.12);
    border-color: rgba(224,95,95,0.4);
    color: #f0a0a0;
  }
  .opt-btn.wrong .letter { background: rgba(224,95,95,0.25); border-color: var(--red); color: #f0a0a0; }
  .opt-btn.reveal-correct {
    background: rgba(76,175,130,0.08);
    border-color: rgba(76,175,130,0.3);
    color: #a3ddc0;
  }

  .feedback-box {
    margin-top: 1.2rem;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    animation: fadeUp 0.3s ease;
  }
  .feedback-box.ok { background: rgba(76,175,130,0.12); border: 0.5px solid rgba(76,175,130,0.35); color: #a3ddc0; }
  .feedback-box.err { background: rgba(224,95,95,0.1); border: 0.5px solid rgba(224,95,95,0.3); color: #f0a0a0; }
  .feedback-box strong { display: block; margin-bottom: 4px; font-size: 14px; }

  .next-btn {
    width: 100%;
    margin-top: 1.2rem;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent2), #9b8ffc);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-family: 'Lato', Georgia, serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.15s;
    animation: fadeUp 0.3s ease;
  }
  .next-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  .result-screen {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    animation: fadeUp 0.5s ease;
  }
  .result-screen .medal { font-size: 56px; margin-bottom: 1rem; }
  .result-screen h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 26px;
    margin-bottom: 8px;
  }
  .result-screen .score {
    font-size: 52px;
    font-weight: 700;
    color: var(--accent);
    margin: 1rem 0;
    line-height: 1;
  }
  .result-screen .score span { font-size: 20px; color: var(--muted); }
  .result-screen .result-msg { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .result-stat { background: var(--surface2); border-radius: 10px; padding: 14px; }
  .result-stat .n { font-size: 24px; font-weight: 700; }
  .result-stat .l { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .result-stat.g .n { color: var(--green); }
  .result-stat.r .n { color: var(--red); }

  .round-result {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    animation: fadeUp 0.4s ease;
  }
  .round-result h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; margin-bottom: 8px; }
  .round-result .rs { font-size: 44px; font-weight: 700; color: var(--accent); margin: 12px 0; }
  .round-result p { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }

  .start-screen {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    animation: fadeUp 0.5s ease;
  }
  .start-screen .icon { font-size: 52px; margin-bottom: 1rem; }
  .start-screen h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 24px; margin-bottom: 10px; }
  .start-screen p { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; }
  .info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .info-box { background: var(--surface2); border-radius: 10px; padding: 14px 8px; }
  .info-box .n { font-size: 22px; font-weight: 700; color: var(--accent); }
  .info-box .l { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .big-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent2), #9b8ffc);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-family: 'Lato', Georgia, serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .big-btn:hover { opacity: 0.88; transform: translateY(-2px); }
  .big-btn.gold { background: linear-gradient(135deg, #b8922a, var(--accent)); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>
<div id="app">
  <div class="top-header">
    <div class="eyebrow">IBBC Ferraz – Centro</div>
    <h1>Simulado de História da Igreja 3</h1>
    <p>Reforma, denominações brasileiras, Racionalismo e Empirismo</p>
  </div>

  <div id="stats-bar" style="display:none">
    <div class="stat-box">
      <div class="num" id="s-rodada">1/3</div>
      <div class="lbl">Rodada</div>
    </div>
    <div class="stat-box">
      <div class="num" id="s-q">1/10</div>
      <div class="lbl">Questão</div>
    </div>
    <div class="stat-box acerto">
      <div class="num" id="s-acertos">0</div>
      <div class="lbl">Acertos</div>
    </div>
    <div class="stat-box erro">
      <div class="num" id="s-erros">0</div>
      <div class="lbl">Erros</div>
    </div>
  </div>

  <div id="progress-wrap" style="display:none">
    <div class="progress-labels">
      <span>Progresso</span>
      <span id="prog-label">0 / 23</span>
    </div>
    <div class="progress-track">
      <div id="prog"></div>
    </div>
  </div>

  <div id="main"></div>
</div>

<script>
const ROUND_NAMES = ["Fundadores e Igrejas — Relacione","A Reforma e Seus Movimentos","Racionalismo e Empirismo"];

const QUESTIONS = [
[
{q:"David Miranda fundou qual igreja, em São Paulo, em 1962?",
 opts:["Deus é Amor","O Brasil Para Cristo","Casa da Benção","Congregação Cristã do Brasil"],
 c:0, exp:"David Miranda fundou a Igreja Deus é Amor em São Paulo em 1962."},

{q:"John Wesley é o fundador de qual denominação?",
 opts:["Metodista","Igreja Presbiteriana","Igreja Batista","Assembleia de Deus"],
 c:0, exp:"John Wesley é o fundador do Metodismo (séc. XVIII, Inglaterra)."},

{q:"Doriel de Oliveira e Ruth Brunelli de Oliveira fundaram qual igreja?",
 opts:["Casa da Benção","Deus é Amor","O Brasil Para Cristo","Assembleia de Deus"],
 c:0, exp:"Doriel e Ruth Brunelli fundaram a Casa da Benção."},

{q:"A influência de João Calvino está na origem de qual igreja?",
 opts:["Igreja Presbiteriana","Igreja Metodista","Igreja Batista","Igreja Luterana"],
 c:0, exp:"Calvino organizou a Reforma em Genebra e sua influência está na origem da Igreja Presbiteriana."},

{q:"Manoel de Mello fundou qual igreja, em 1955?",
 opts:["O Brasil Para Cristo","Deus é Amor","Casa da Benção","Assembleia de Deus"],
 c:0, exp:"Manoel de Mello fundou a Igreja O Brasil Para Cristo em 1955."},

{q:"Louis Francescon fundou qual igreja, em 1910?",
 opts:["Congregação Cristã do Brasil","Assembleia de Deus","O Brasil Para Cristo","Deus é Amor"],
 c:0, exp:"Louis Francescon fundou a Congregação Cristã do Brasil em 1910."},

{q:"A venda de indulgências era uma prática de qual igreja, e motivou a Reforma Luterana?",
 opts:["Igreja Católica Romana","Igreja Ortodoxa","Igreja Anglicana","Igreja Luterana"],
 c:0, exp:"A venda de indulgências era uma prática da Igreja Católica Romana que motivou a Reforma Luterana."},

{q:"Daniel Berg e Gunnar Vingren fundaram qual igreja no Brasil, em 1911, em Belém-PA?",
 opts:["Assembleia de Deus","Congregação Cristã do Brasil","O Brasil Para Cristo","Casa da Benção"],
 c:0, exp:"Daniel Berg e Gunnar Vingren fundaram a Assembleia de Deus no Brasil em 1911 (Belém-PA)."},

{q:"Qual filósofo é a figura central do Racionalismo, que colocava a razão como fonte do conhecimento?",
 opts:["René Descartes","John Locke","David Hume","Francis Bacon"],
 c:0, exp:"O Racionalismo tem como figura central René Descartes (séc. XVII)."},

{q:"Quem é o autor de 'As Institutas de Religião Cristã', publicada em 1536?",
 opts:["João Calvino","Martinho Lutero","Ulrico Zuínglio","John Wesley"],
 c:0, exp:"As Institutas de Religião Cristã é a grande obra de João Calvino, publicada em 1536."}
],

[
{q:"Quem liderou a Reforma na Suíça, especialmente em Zurique, a partir de 1519?",
 opts:["Ulrico Zuínglio","Martinho Lutero","João Calvino","John Wesley"],
 c:0, exp:"Correto. Ulrich Zuínglio liderou a Reforma na Suíça, especialmente em Zurique a partir de 1519. Foi contemporâneo de Lutero mas atuou de forma independente."},

{q:"Os Anabatistas (Batistas) batizavam crianças?",
 opts:["Sim, batizavam desde o nascimento","Não, rejeitavam o batismo infantil e batizavam somente adultos que professassem a fé","Apenas em casos especiais","Não tinham nenhuma prática de batismo"],
 c:1, exp:"Falso que os Anabatistas batizavam crianças. Eles rejeitavam o batismo infantil. Defendiam que o batismo deveria ser aplicado somente a adultos que professassem a fé ('rebatizadores')."},

{q:"Os menonitas vieram ao Brasil?",
 opts:["Não, nunca emigraram para a América do Sul","Sim — fixaram-se na Alemanha, México e outras nações, emigrando inclusive para a América do Sul, incluindo o Brasil","Apenas em visitas missionárias temporárias","Não há nenhum registro histórico disso"],
 c:1, exp:"Falso que os menonitas nunca vieram ao Brasil. A apostila informa que 'os menonitas se fixaram na Alemanha, México e outras nações, emigrando inclusive para a América do Sul'."},

{q:"Complete: Apesar de seu ___, os menonitas foram considerados perigosos/subversivos pelas autoridades.",
 opts:["Pacifismo","Nacionalismo","Fanatismo religioso","Tradicionalismo litúrgico"],
 c:0, exp:"Gabarito: 'Apesar de seu pacifismo, os menonitas foram considerados perigosos/subversivos pelas autoridades porque se negavam a participar da vida comum da sociedade.'"},

{q:"Por que os menonitas foram considerados perigosos/subversivos pelas autoridades?",
 opts:["Porque se recusavam a pagar impostos","Porque, apesar de pacifistas, se negavam a participar da vida comum da sociedade (incluindo o serviço militar)","Porque pregavam abertamente contra o governo","Porque praticavam poligamia"],
 c:1, exp:"Os menonitas eram pacifistas e recusavam o serviço militar e a participação em guerras, o que os tornava suspeitos politicamente perante as autoridades."},

{q:"O Iluminismo (séc. XVII–XVIII) afetou o Cristianismo?",
 opts:["Não, em absolutamente nada","Sim — fortaleceu o deísmo, o ceticismo bíblico e gerou grande oposição à autoridade da Igreja e à revelação sobrenatural","Apenas de forma positiva, fortalecendo a fé","Afetou somente a Igreja Católica"],
 c:1, exp:"Falso que o Iluminismo não afetou em nada o Cristianismo. Ele afetou profundamente: fortaleceu o deísmo, o ceticismo bíblico, e gerou grande oposição à autoridade da Igreja e à revelação sobrenatural."},

{q:"Qual era a ênfase dos Puritanos, segundo a apostila?",
 opts:["O estudo da Bíblia e a pregação da Palavra","A liturgia formal e os sacramentos","A hierarquia episcopal","O misticismo contemplativo"],
 c:0, exp:"Correto. Os Puritanos eram conhecidos pelo rigor bíblico e pela ênfase no estudo das Escrituras e na pregação fiel da Palavra de Deus."}
],

[
{q:"Quem é considerado o pai do Racionalismo moderno, autor da frase 'Penso, logo existo'?",
 opts:["René Descartes","Baruch Spinoza","Gottfried Wilhelm Leibniz","John Locke"],
 c:0, exp:"René Descartes (1596–1650) — francês, considerado o pai do Racionalismo moderno; 'Penso, logo existo'."},

{q:"Qual filósofo holandês do Racionalismo desenvolveu o método geométrico na filosofia?",
 opts:["Baruch Spinoza","René Descartes","Gottfried Wilhelm Leibniz","David Hume"],
 c:0, exp:"Baruch Spinoza (1632–1677) — holandês, desenvolveu o método geométrico na filosofia."},

{q:"Qual filósofo alemão foi co-inventor do cálculo e criador da monadologia?",
 opts:["Gottfried Wilhelm Leibniz","René Descartes","Baruch Spinoza","Francis Bacon"],
 c:0, exp:"Gottfried Wilhelm Leibniz (1646–1716) — alemão, co-inventor do cálculo e criador da monadologia."},

{q:"Qual filósofo inglês é considerado o precursor do método indutivo científico, ligado ao Empirismo?",
 opts:["Francis Bacon","John Locke","David Hume","George Berkeley"],
 c:0, exp:"Francis Bacon (1561–1626) — inglês, precursor do método indutivo científico."},

{q:"Qual filósofo empirista defendia que a mente é uma 'tábula rasa' preenchida pela experiência?",
 opts:["John Locke","Francis Bacon","David Hume","George Berkeley"],
 c:0, exp:"John Locke (1632–1704) — inglês, defendia que a mente é uma 'tábula rasa' preenchida pela experiência."},

{q:"Qual filósofo escocês aprofundou o ceticismo dentro do Empirismo?",
 opts:["David Hume","John Locke","George Berkeley","Francis Bacon"],
 c:0, exp:"David Hume (1711–1776) — escocês, aprofundou o ceticismo empirista."}
]
];

const TOTAL_Q = 23;
const N_ROUNDS = 3;

let round = 0, qIdx = 0, answered = false;
let totalAcertos = 0, totalErros = 0;
let roundAcertos = 0;
let qDoneBefore = 0; // questions completed in previous rounds
const LETTERS = ['A','B','C','D'];

function getEl(id){ return document.getElementById(id); }

function roundSize(r){ return QUESTIONS[r].length; }

function updateStats(){
  const totalQ = qDoneBefore + qIdx;
  const pct = totalQ / TOTAL_Q * 100;
  getEl('prog').style.width = pct + '%';
  getEl('prog-label').textContent = totalQ + ' / ' + TOTAL_Q;
  getEl('s-rodada').textContent = (round+1)+'/'+N_ROUNDS;
  getEl('s-q').textContent = (qIdx+1)+'/'+roundSize(round);
  getEl('s-acertos').textContent = totalAcertos;
  getEl('s-erros').textContent = totalErros;
}

function showHUD(visible){
  getEl('stats-bar').style.display = visible ? 'grid' : 'none';
  getEl('progress-wrap').style.display = visible ? 'block' : 'none';
}

function showStart(){
  showHUD(false);
  getEl('main').innerHTML = `
    <div class="start-screen">
      <div class="icon">📜</div>
      <h2>Simulado de História da Igreja 3</h2>
      <p>Reforma, denominações brasileiras, Racionalismo e Empirismo</p>
      <div class="info-grid">
        <div class="info-box"><div class="n">${N_ROUNDS}</div><div class="l">Rodadas</div></div>
        <div class="info-box"><div class="n">${TOTAL_Q}</div><div class="l">Questões</div></div>
        <div class="info-box"><div class="n">~12</div><div class="l">Minutos</div></div>
      </div>
      <button class="big-btn" onclick="startQuiz()">Começar o Simulado →</button>
    </div>`;
}

function startQuiz(){
  round = 0; qIdx = 0; totalAcertos = 0; totalErros = 0; roundAcertos = 0; qDoneBefore = 0;
  showHUD(true);
  showQuestion();
}

function showQuestion(){
  answered = false;
  updateStats();
  const q = QUESTIONS[round][qIdx];
  const rSize = roundSize(round);

  const optsHTML = q.opts.map((o,i) => `
    <button class="opt-btn" id="opt${i}" onclick="answer(${i})">
      <span class="letter">${LETTERS[i]}</span>
      <span>${o}</span>
    </button>`).join('');

  getEl('main').innerHTML = `
    <div class="q-card">
      <div class="round-badge">Rodada ${round+1} — ${ROUND_NAMES[round]}</div>
      <div class="q-num">Questão ${qIdx+1} de ${rSize}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      <div id="feedback"></div>
    </div>`;
}

function answer(idx){
  if(answered) return;
  answered = true;
  const q = QUESTIONS[round][qIdx];
  const correct = idx === q.c;
  if(correct){ totalAcertos++; roundAcertos++; }
  else { totalErros++; }
  updateStats();

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  btns[idx].classList.add(correct ? 'correct' : 'wrong');
  if(!correct) btns[q.c].classList.add('reveal-correct');

  const icon = correct ? '✓ Correto!' : '✗ Incorreto';
  const cls = correct ? 'ok' : 'err';
  const rSize = roundSize(round);
  getEl('feedback').innerHTML = `
    <div class="feedback-box ${cls}">
      <strong>${icon}</strong>
      ${q.exp}
    </div>
    <button class="next-btn" onclick="nextQuestion()">
      ${qIdx < rSize-1 ? 'Próxima questão →' : 'Ver resultado da rodada →'}
    </button>`;
}

function nextQuestion(){
  const rSize = roundSize(round);
  if(qIdx < rSize-1){
    qIdx++;
    showQuestion();
  } else {
    showRoundResult();
  }
}

function showRoundResult(){
  const rSize = roundSize(round);
  const pct = Math.round(roundAcertos / rSize * 100);
  let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
  let msg = pct >= 80 ? 'Excelente! Você domina este tema.' : pct >= 60 ? 'Bom resultado! Continue estudando.' : 'Estude mais este conteúdo antes de prosseguir.';

  getEl('main').innerHTML = `
    <div class="round-result">
      <div style="font-size:48px;margin-bottom:12px">${emoji}</div>
      <h2>Resultado da Rodada ${round+1}</h2>
      <div class="rs">${roundAcertos}/${rSize}</div>
      <p>${pct}% de acertos — ${msg}</p>
      ${round < N_ROUNDS-1 ? `<button class="big-btn" onclick="nextRound()">Próxima Rodada →</button>` : `<button class="big-btn gold" onclick="showFinalResult()">Ver Resultado Final 🏁</button>`}
    </div>`;
}

function nextRound(){
  qDoneBefore += roundSize(round);
  round++;
  qIdx = 0;
  roundAcertos = 0;
  showQuestion();
}

function showFinalResult(){
  const pct = Math.round(totalAcertos / TOTAL_Q * 100);
  let medal = pct >= 90 ? '🥇' : pct >= 75 ? '🥈' : pct >= 60 ? '🥉' : '📚';
  let msg = pct >= 90 ? 'Parabéns! Você tem um domínio excelente do conteúdo. Está pronto para a prova!'
    : pct >= 75 ? 'Muito bom! Revise os tópicos em que errou e você estará pronto.'
    : pct >= 60 ? 'Bom esforço! Recomendamos reler os capítulos com mais erros.'
    : 'Continue estudando! Releia o material com calma e refaça o simulado.';

  getEl('prog').style.width = '100%';
  getEl('prog-label').textContent = TOTAL_Q + ' / ' + TOTAL_Q;
  getEl('s-rodada').textContent = N_ROUNDS+'/'+N_ROUNDS;
  getEl('s-acertos').textContent = totalAcertos;
  getEl('s-erros').textContent = totalErros;

  getEl('main').innerHTML = `
    <div class="result-screen">
      <div class="medal">${medal}</div>
      <h2>Simulado Concluído!</h2>
      <div class="score">${totalAcertos}<span>/${TOTAL_Q}</span></div>
      <div class="result-grid">
        <div class="result-stat g"><div class="n">${totalAcertos}</div><div class="l">Acertos</div></div>
        <div class="result-stat r"><div class="n">${totalErros}</div><div class="l">Erros</div></div>
        <div class="result-stat"><div class="n">${pct}%</div><div class="l">Aproveitamento</div></div>
        <div class="result-stat"><div class="n">${N_ROUNDS}</div><div class="l">Rodadas</div></div>
      </div>
      <div class="result-msg">${msg}</div>
      <button class="big-btn" onclick="location.reload()" style="margin-bottom:12px">Refazer o Simulado 🔄</button>
    </div>`;
}

showStart();
</script>
</body>
</html>
