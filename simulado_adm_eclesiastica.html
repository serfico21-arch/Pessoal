<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado – Administração Eclesiástica</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131f;
    --card: #1a1a2e;
    --border: #2a2a45;
    --gold: #c9a84c;
    --gold-light: #e8c96b;
    --cream: #f5f0e8;
    --muted: #8888aa;
    --correct: #4caf7d;
    --wrong: #e05555;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d0d14 0%, #1a1428 50%, #0d0d14 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% -10%, rgba(201,168,76,.18), transparent);
    pointer-events: none;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    color: var(--gold-light);
    letter-spacing: .02em;
    line-height: 1.15;
  }
  header p {
    margin-top: 6px;
    font-size: .85rem;
    color: var(--muted);
    font-style: italic;
    letter-spacing: .06em;
  }

  /* ── PROGRESS BAR ── */
  #progress-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  #progress-label {
    font-size: .78rem;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  #progress-bar-outer {
    flex: 1;
    min-width: 120px;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 99px;
    transition: width .5s ease;
    width: 0%;
  }
  #score-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 14px;
    font-size: .8rem;
    color: var(--gold);
    white-space: nowrap;
  }

  /* ── MAIN ── */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 16px 80px;
  }

  /* ── ROUND BADGE ── */
  .round-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
    animation: fadeUp .4s ease both;
  }
  .round-number {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #0d0d14;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 1rem;
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .round-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--gold-light);
    letter-spacing: .04em;
  }
  .round-subtitle {
    font-size: .78rem;
    color: var(--muted);
    font-style: italic;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px;
    margin-bottom: 16px;
    animation: fadeUp .35s ease both;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--gold), transparent);
    border-radius: 3px 0 0 3px;
  }
  .q-number {
    font-size: .72rem;
    color: var(--gold);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 1rem;
    line-height: 1.6;
    color: var(--cream);
    margin-bottom: 18px;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--cream);
    font-family: 'Source Serif 4', serif;
    font-size: .9rem;
    line-height: 1.5;
    text-align: left;
    cursor: pointer;
    transition: border-color .2s, background .2s, transform .15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(201,168,76,.07);
    transform: translateX(3px);
  }
  .option-btn .opt-letter {
    background: var(--border);
    color: var(--muted);
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background .2s, color .2s;
  }
  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(76,175,125,.12);
  }
  .option-btn.correct .opt-letter { background: var(--correct); color: #fff; }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(224,85,85,.1);
  }
  .option-btn.wrong .opt-letter { background: var(--wrong); color: #fff; }
  .option-btn:disabled { cursor: default; transform: none; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: .85rem;
    line-height: 1.55;
    display: none;
  }
  .feedback.show { display: block; animation: fadeUp .25s ease; }
  .feedback.correct-fb { background: rgba(76,175,125,.12); border: 1px solid rgba(76,175,125,.3); color: #7ddfaa; }
  .feedback.wrong-fb  { background: rgba(224,85,85,.1);  border: 1px solid rgba(224,85,85,.3);  color: #f09090; }

  /* ── NEXT BUTTON ── */
  #next-btn {
    display: none;
    margin: 24px auto 0;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #0d0d14;
    border: none;
    border-radius: 8px;
    padding: 13px 36px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: .05em;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
  }
  #next-btn:hover { opacity: .88; transform: translateY(-1px); }

  /* ── RESULT SCREEN ── */
  #result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px 60px;
    animation: fadeUp .5s ease;
  }
  #result-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold-light);
    margin-bottom: 12px;
  }
  #result-screen .final-score {
    font-size: 4rem;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin: 16px 0;
  }
  #result-screen p { color: var(--muted); font-size: .95rem; margin-bottom: 28px; line-height: 1.7; }
  .restart-btn {
    background: var(--card);
    border: 1.5px solid var(--gold);
    color: var(--gold);
    border-radius: 8px;
    padding: 12px 32px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    cursor: pointer;
    transition: background .2s;
  }
  .restart-btn:hover { background: rgba(201,168,76,.1); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .q-text { font-size: .92rem; }
    .option-btn { font-size: .84rem; padding: 10px 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>⛪ Administração Eclesiástica</h1>
  <p>Simulado Completo · IBBC / Teologia</p>
</header>

<div id="progress-wrap">
  <span id="progress-label">Progresso</span>
  <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
  <span id="score-badge">✦ 0 / 0</span>
</div>

<main>
  <div id="quiz-area"></div>
  <button id="next-btn">Próxima Pergunta →</button>
  <div id="result-screen">
    <h2>Simulado Concluído</h2>
    <div class="final-score" id="final-score-display"></div>
    <p id="result-msg"></p>
    <button class="restart-btn" onclick="restart()">↺ Refazer Simulado</button>
  </div>
</main>

<script>
// ─────────────────────────────────────────────
// BANCO DE QUESTÕES — 100 perguntas / 10 rodadas
// Organizadas em sequência lógica do conteúdo
// ─────────────────────────────────────────────
const ALL_QUESTIONS = [

// ══════════ RODADA 1 – Conceitos Gerais de Administração ══════════
{ round:1, roundTitle:"Conceitos Gerais de Administração", q:"O que é administração, segundo o livro?",
  opts:["Gerir um organismo utilizando todos os recursos disponíveis para atingir os objetivos com 100% de aproveitamento","Apenas controlar finanças e patrimônio da organização","Somente selecionar e gerenciar pessoas em um grupo"],
  correct:0, fb:"Administração é a ciência de gerir um organismo racionalizando os recursos (humanos, materiais, financeiros, informações) para atingir os objetivos com 100% de aproveitamento." },

{ round:1, q:"Quais são os quatro recursos básicos da administração citados no livro?",
  opts:["Humanos, Materiais, Financeiros e Informação","Humanos, Espirituais, Tecnológicos e Materiais","Liderança, Oração, Planejamento e Controle"],
  correct:0, fb:"Os quatro recursos são: HUMANOS (100%), MATERIAIS (100%), FINANCEIROS (100%) e INFORMAÇÃO (100%). Cada um deve ser aproveitado ao máximo." },

{ round:1, q:"O que é Administração Eclesiástica?",
  opts:["O estudo dos aspectos que influenciam a organização da Igreja de Cristo — o aspecto espiritual, social e econômico","Apenas a gestão financeira de uma denominação religiosa","Somente a aplicação de leis civis ao funcionamento da igreja"],
  correct:0, fb:"Administração Eclesiástica é o estudo de todos os aspectos que influenciam a organização do corpo de Deus — espiritual, social e econômico — visando auxiliar administradores a conduzir o organismo com excelência." },

{ round:1, q:"Segundo o livro, a Igreja é ao mesmo tempo organismo e organização. O que isso significa?",
  opts:["Como organismo é o Corpo de Cristo guiado biblicamente; como organização precisa de eficiência administrativa e cumprimento da legislação","A Igreja só precisa de espiritualidade, dispensando qualquer estrutura formal","A Igreja é somente uma entidade jurídica sujeita às leis do Estado"],
  correct:0, fb:"A Igreja como organismo é guiada pelo modelo bíblico centrado em Cristo. Como organização precisa de eficiência administrativa e deve cumprir a legislação pertinente — lembrando: 'Dê a César o que é de César'." },

{ round:1, q:"Qual é a razão principal, apontada na introdução, de ministérios frustrados?",
  opts:["Escolhidos que desconhecem elementos básicos da Administração Eclesiástica","Falta de vocação verdadeira para o ministério","Ausência de recursos financeiros suficientes"],
  correct:0, fb:"O livro afirma que a razão de muitos ministérios frustrados não é a falta de vocação, mas escolhidos que desconhecem princípios básicos da Administração Eclesiástica." },

{ round:1, q:"A administração pode dar ao pastor o sucesso total no ministério?",
  opts:["Não; mas o pastor bem-sucedido certamente não negligenciará seus princípios","Sim, a ciência administrativa garante o sucesso total","Sim, desde que aplique 100% dos recursos disponíveis"],
  correct:0, fb:"O livro é claro: não queremos dizer que a ciência da administração dará ao pastor o sucesso total, mas o pastor bem-sucedido certamente não negligenciará tais princípios." },

{ round:1, q:"Qual das seguintes NÃO é listada como problema administrativo que o pastor enfrenta?",
  opts:["Escolha do idioma das pregações","Apresentar um plano estratégico de 6 anos","Prestações de contas anuais da Igreja"],
  correct:0, fb:"Entre os problemas listados estão: plano estratégico, orçamento, reuniões de diretoria, prestação de contas, investimentos, contratação de funcionários etc. Idioma das pregações não é mencionado." },

{ round:1, q:"Sobre o administrador cristão, qual é sua maior fonte de sucesso?",
  opts:["Depender de Deus, sendo excelente na arte de trabalhar com pessoas, pois seu sucesso será agradável a Deus (1Tm 3:5-6)","Ter formação acadêmica em gestão e finanças","Controlar rigidamente todos os recursos da organização"],
  correct:0, fb:"O administrador deve ser especialista em trabalhar com pessoas; seu sucesso só será agradável a Deus quando ajudar outros a fazerem bem o trabalho atribuído a eles (1Tm 3:5-6)." },

{ round:1, q:"O que o livro diz sobre Deus e a organização?",
  opts:["Deus é um ser organizado; planejou cada ação sem ser surpreendido, sendo o Executivo interessado no progresso do Seu reino na terra","Deus não se preocupa com a estrutura organizacional humana","A organização é exclusivamente responsabilidade humana, sem envolvimento divino"],
  correct:0, fb:"O livro afirma que Deus é um ser organizado: orientou Noé a construir a Arca com detalhes completos, planeja todas as Suas ações e nada pode surpreendê-Lo. Ele é o maior interessado no progresso do reino de Deus na terra." },

{ round:1, q:"Segundo o livro, todos somos administradores. O que isso implica?",
  opts:["Todo ser humano administra recursos diariamente — tempo, dinheiro, habilidades — e cada um é chamado a ser um bom administrador","Somente pastores e líderes eclesiásticos exercem administração","Administração é restrita a quem possui cargo formal na organização"],
  correct:0, fb:"O livro ensina que todos administramos: gerimos nossa vida, família, organização, dons. Todas as pessoas têm habilidades administrativas e são chamadas a usá-las com excelência." },

// ══════════ RODADA 2 – Os Objetivos da Administração ══════════
{ round:2, roundTitle:"Os Objetivos da Administração", q:"Quais são os 5 objetivos (funções) principais da administração, segundo o capítulo 2?",
  opts:["Prever, Organizar, Comandar, Coordenar e Avaliar","Planejar, Contratar, Executar, Fiscalizar e Corrigir","Orar, Planejar, Delegar, Monitorar e Celebrar"],
  correct:0, fb:"Os 5 objetivos são: PREVER (Lc 14.28-32), ORGANIZAR (Pv 18.9), COMANDAR (Pv 11.14), COORDENAR (Ef 4.11-16) e AVALIAR (Lc 19.11-27). A administração é um processo contínuo." },

{ round:2, q:"O que é 'Prever' na administração eclesiástica?",
  opts:["Preparar-se para o futuro com antecedência, estabelecendo programas de ação, previsão, objetivos, programação, cronograma e orçamento","Apenas fazer orações e planos espirituais para o futuro da igreja","Somente elaborar o orçamento anual da organização"],
  correct:0, fb:"Prever é preparar-se para o futuro com antecedência. Inclui: planejamento, previsão, estabelecimento de objetivos, programação (prioridades), cronograma (prazos) e orçamento (distribuição de recursos)." },

{ round:2, q:"O que é 'Organizar' segundo o capítulo 2 (Pv 18.9)?",
  opts:["Reunir meios e recursos materiais e humanos, distribuídos racionalmente e harmonizados para funcionar como um todo","Apenas separar tarefas por setores sem integração entre eles","Somente contratar funcionários e definir salários"],
  correct:0, fb:"Organizar é reunir meios e recursos materiais e humanos, distribuídos racionalmente e de tal forma harmonizados que possam funcionar como um todo integrado." },

{ round:2, q:"O que envolve 'Comandar' (Pv 11.14)?",
  opts:["Tomar decisões, inspirar pessoas, escolher pessoas para cargos e ajudá-las a melhorar seus conhecimentos e habilidades","Apenas dar ordens sem se preocupar com o desenvolvimento da equipe","Controlar financeiramente todos os setores da organização"],
  correct:0, fb:"Comandar é determinar providências para que a organização funcione conforme a norma vigente. Inclui: tomar decisões, criar compreensão, inspirar/estimular pessoas, escolher pessoas para cargos e ajudá-las a crescer." },

{ round:2, q:"O que é 'Coordenar' segundo Ef 4.11-16?",
  opts:["Manter o organismo em funcionamento homogêneo e integrado, proporcionando o desenvolvimento de cada órgão para manter o equilíbrio operacional","Apenas monitorar o trabalho dos voluntários","Distribuir recursos financeiros entre os departamentos"],
  correct:0, fb:"Coordenar é manter o organismo em funcionamento homogêneo e integrado em suas diversas atividades, proporcionando o desenvolvimento de cada órgão e mantendo o equilíbrio do sistema operacional, evitando atritos, perdas de tempo e complicações indesejáveis." },

{ round:2, q:"Para que serve 'Avaliar' (Lc 19.11-27)?",
  opts:["Regular o trabalho em andamento e o acabado: registrar, avaliar resultados e aperfeiçoar métodos","Apenas punir quem errou nas tarefas","Substituir líderes que não atingiram suas metas"],
  correct:0, fb:"Avaliar tem o sentido de regular o trabalho em andamento e o acabado. Principais atividades: registrar e relatar o trabalho, avaliar o trabalho e os resultados obtidos, e regular/aperfeiçoar os métodos e resultados." },

{ round:2, q:"Por que a administração é um processo contínuo?",
  opts:["Porque se não for contínuo não alcançará seus objetivos; as funções se retroalimentam em ciclo permanente","Porque cada projeto começa do zero sem aproveitar experiências anteriores","Porque a legislação exige relatórios mensais de todas as organizações"],
  correct:0, fb:"A administração é um processo contínuo porque se não for contínuo não alcançará seus objetivos. As funções (prever, organizar, comandar, coordenar, avaliar) formam um ciclo que se repete e se aprimora." },

{ round:2, q:"O que o livro diz sobre objetivos e alvos (metas) SMART?",
  opts:["Alvos devem ser Específicos, Mensuráveis, Atingíveis, Relevantes e Temporais (SMART)","Basta que os objetivos sejam espirituais; os critérios são secundários","Objetivos devem ser vagos para permitir flexibilidade total"],
  correct:0, fb:"O livro apresenta o método SMART: Specific (Específico), Measurable (Mensurável), Attainable (Atingível), Relevant (Relevante), Temporal. Alvos SMART são essenciais para a boa administração." },

{ round:2, q:"Quais são os benefícios de estabelecer alvos/metas?",
  opts:["Simplificam o processo de decisões, melhoram a saúde mental, criam um sistema de medida de comportamento e providenciam um sistema de controle","Eliminam a necessidade de avaliar o trabalho posterior","Tornam a gestão independente de qualquer planejamento prévio"],
  correct:0, fb:"O livro lista benefícios dos alvos: simplificam o processo de decisões, melhoram a saúde mental e ética, providenciam um sistema de medida do comportamento e diminuem o stress e a confusão." },

{ round:2, q:"O que é 'missão' de uma organização, segundo o capítulo 4?",
  opts:["O conjunto de ações que a organização deve realizar para atingir sua visão; define as prioridades e possibilidades","A visão de longo prazo que a organização deseja alcançar","O plano estratégico de 6 anos para o crescimento da igreja"],
  correct:0, fb:"Missão define as ações a realizar para cumprir a visão, delimitando prioridades e possibilidades. É diferente de Visão (fotografia positiva do futuro preferível) e de Alvos (objetivos de curto prazo que conduzem à visão)." },

// ══════════ RODADA 3 – A Administração na Igreja: Organismo e Organização ══════════
{ round:3, roundTitle:"A Administração na Igreja: Organismo e Organização", q:"Qual é o princípio-chave que orienta a Igreja como organismo, segundo o cap. 3?",
  opts:["Toda alma tenha como objetivo as necessidades espirituais dos outros (Rm 12.1): ser 'pessoal', não 'fechado'","A Igreja deve ser administrada exclusivamente pela hierarquia eclesiástica","O crescimento numérico é o único objetivo do organismo eclesial"],
  correct:0, fb:"A Igreja como organismo expressa o princípio: 'Toda alma tenha como objetivo as necessidades espirituais dos outros' (Rm 12.1). Isso significa ser pessoal e não fechado — cuidando do próximo e da comunidade." },

{ round:3, q:"Por que a Igreja, como organização, precisa seguir leis humanas além das bíblicas?",
  opts:["Porque a organização precisa buscar eficiência administrativa e cumprir a legislação pertinente — 'Dê a César o que é de César'","Porque as leis humanas são superiores à lei de Deus na esfera pública","Porque sem registro civil a Igreja não pode realizar cultos"],
  correct:0, fb:"O livro afirma que a Igreja como organização precisa buscar eficiência administrativa e cumprir a legislação pertinente. Lembramo-nos das palavras de Jesus: 'Dê a César o que é de César'." },

{ round:3, q:"Quais são os 3 problemas com a autoridade humana na Igreja?",
  opts:["Quando o homem exerce autoridade que pertence só a Deus; quando a autoridade religiosa conflita com a Palavra de Deus; quando se eleva a tradição acima da Bíblia","Quando há excesso de democracia, falta de hierarquia e ausência de disciplina","Quando membros não obedecem, quando há divisão e quando falta recurso financeiro"],
  correct:0, fb:"Os 3 problemas com a autoridade humana: (1) exercer autoridade que pertence somente a DEUS; (2) quando a autoridade religiosa entra em conflito com a autoridade da Palavra de DEUS; (3) quando se eleva a autoridade dos costumes e da tradição acima da autoridade da Bíblia." },

{ round:3, q:"Quais são os três níveis de autoridade reservados somente a Deus?",
  opts:["Autoridade Soberana ou Imperial, Autoridade da Verdade e Autoridade da Consciência","Autoridade Delegada, Autoridade Estipulada e Autoridade Funcional","Autoridade Pastoral, Autoridade Diaconal e Autoridade Apostólica"],
  correct:0, fb:"Os três níveis reservados somente a Deus: I. Autoridade Soberana ou Imperial (absoluta, infalível, só pertence a DEUS); II. Autoridade da Verdade (tudo que é verdadeiro tem autoridade); III. Autoridade da Consciência (seguir a conduta divina)." },

{ round:3, q:"O que é 'Autoridade Delegada' segundo o livro?",

// ESTADO DO APP
// ─────────────────────────────────────────────
let currentIdx = 0;
let score = 0;
let answered = false;

const TOTAL = ALL_QUESTIONS.length;

function getRoundTitle(q) {
  return q.roundTitle || '';
}

function render() {
  const quizArea = document.getElementById('quiz-area');
  const nextBtn  = document.getElementById('next-btn');
  const resultScreen = document.getElementById('result-screen');

  if (currentIdx >= TOTAL) {
    quizArea.style.display = 'none';
    nextBtn.style.display = 'none';
    resultScreen.style.display = 'block';
    const pct = Math.round((score / TOTAL) * 100);
    document.getElementById('final-score-display').textContent = score + ' / ' + TOTAL;
    let msg = '';
    if (pct >= 90) msg = '🏆 Excelente! Você domina Administração Eclesiástica com maestria!';
    else if (pct >= 75) msg = '✨ Muito bom! Você tem sólido conhecimento do conteúdo.';
    else if (pct >= 60) msg = '👍 Bom desempenho! Revise os tópicos em que errou.';
    else msg = '📖 Continue estudando! Revise o material e tente novamente.';
    document.getElementById('result-msg').textContent = msg + ' (' + pct + '% de aproveitamento)';
    updateProgress();
    return;
  }

  answered = false;
  nextBtn.style.display = 'none';

  const q = ALL_QUESTIONS[currentIdx];
  const isNewRound = (currentIdx === 0) ||
    (ALL_QUESTIONS[currentIdx].round !== ALL_QUESTIONS[currentIdx-1].round);

  let html = '';

  if (isNewRound) {
    html += `<div class="round-header" style="animation-delay:0s">
      <div class="round-number">${q.round}</div>
      <div>
        <div class="round-title">Rodada ${q.round}</div>
        <div class="round-subtitle">${getRoundTitle(q)}</div>
      </div>
    </div>`;
  }

  const delay = isNewRound ? '.15s' : '0s';
  html += `<div class="q-card" style="animation-delay:${delay}">
    <div class="q-number">Questão ${currentIdx + 1} de ${TOTAL}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="options">`;

  const letters = ['A','B','C'];
  q.opts.forEach((opt, i) => {
    html += `<button class="option-btn" onclick="selectAnswer(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>`;
  });

  html += `</div>
    <div class="feedback" id="feedback"></div>
  </div>`;

  quizArea.innerHTML = html;
  updateProgress();
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = ALL_QUESTIONS[currentIdx];
  const btns = document.querySelectorAll('.option-btn');
  const feedback = document.getElementById('feedback');

  btns.forEach(b => b.disabled = true);

  if (idx === q.correct) {
    btns[idx].classList.add('correct');
    score++;
    feedback.className = 'feedback correct-fb show';
    feedback.innerHTML = '✓ Correto! ' + q.fb;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    feedback.className = 'feedback wrong-fb show';
    feedback.innerHTML = '✗ Incorreto. ' + q.fb;
  }

  document.getElementById('next-btn').style.display = 'block';
  updateProgress();
}

function updateProgress() {
  const bar = document.getElementById('progress-bar-inner');
  const badge = document.getElementById('score-badge');
  const done = currentIdx + (answered ? 1 : 0);
  bar.style.width = (done / TOTAL * 100) + '%';
  badge.textContent = '✦ ' + score + ' / ' + done;
}

document.getElementById('next-btn').addEventListener('click', () => {
  currentIdx++;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
});

function restart() {
  currentIdx = 0;
  score = 0;
  answered = false;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = '';
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Iniciar
render();
</script>
