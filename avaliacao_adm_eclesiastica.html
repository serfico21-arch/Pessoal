<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado de Administração Eclesiástica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1929;
    --surface2: #221f35;
    --accent: #e8c96d;
    --accent2: #7c6cfc;
    --green: #4caf82;
    --red: #e05f5f;
    --text: #ede8f5;
    --muted: #9087b0;
    --border: rgba(232,201,109,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 10%, rgba(255,255,255,0.22) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 90%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 30%, rgba(255,255,255,0.18) 0%, transparent 100%),
      radial-gradient(2px 2px at 45% 45%, rgba(232,201,109,0.12) 0%, transparent 100%);
    pointer-events:none;
    z-index:0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 2rem 1.5rem 4rem;
  }

  .top-header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeDown 0.6s ease;
  }
  .top-header .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .top-header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .top-header p { font-size: 13px; color: var(--muted); font-weight: 300; }

  #stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
  }
  .stat-box .num { font-size: 22px; font-weight: 700; }
  .stat-box .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .stat-box.acerto .num { color: var(--green); }
  .stat-box.erro .num { color: var(--red); }

  #progress-wrap {
    margin-bottom: 1.8rem;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .progress-track {
    background: var(--surface2);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  #prog {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .q-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    animation: fadeUp 0.4s ease;
  }
  .round-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(124,108,252,0.15);
    border: 0.5px solid rgba(124,108,252,0.35);
    color: #a99dff;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 1.2rem;
  }
  .q-num { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .q-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: var(--surface2);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Lato', Georgia, serif;
    cursor: pointer;
    text-align: left;
    line-height: 1.5;
    transition: all 0.18s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .opt-btn .letter {
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    margin-top: 1px;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .opt-btn:hover:not(:disabled) {
    background: rgba(124,108,252,0.12);
    border-color: rgba(124,108,252,0.4);
    transform: translateX(3px);
  }
  .opt-btn:hover:not(:disabled) .letter {
    background: rgba(124,108,252,0.25);
    border-color: rgba(124,108,252,0.6);
    color: #c4baff;
  }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct {
    background: rgba(76,175,130,0.15);
    border-color: rgba(76,175,130,0.5);
    color: #a3ddc0;
  }
  .opt-btn.correct .letter { background: rgba(76,175,130,0.3); border-color: var(--green); color: #a3ddc0; }
  .opt-btn.wrong {
    background: rgba(224,95,95,0.12);
    border-color: rgba(224,95,95,0.4);
    color: #f0a0a0;
  }
  .opt-btn.wrong .letter { background: rgba(224,95,95,0.25); border-color: var(--red); color: #f0a0a0; }
  .opt-btn.reveal-correct {
    background: rgba(76,175,130,0.08);
    border-color: rgba(76,175,130,0.3);
    color: #a3ddc0;
  }

  .feedback-box {
    margin-top: 1.2rem;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    animation: fadeUp 0.3s ease;
  }
  .feedback-box.ok { background: rgba(76,175,130,0.12); border: 0.5px solid rgba(76,175,130,0.35); color: #a3ddc0; }
  .feedback-box.err { background: rgba(224,95,95,0.1); border: 0.5px solid rgba(224,95,95,0.3); color: #f0a0a0; }
  .feedback-box strong { display: block; margin-bottom: 4px; font-size: 14px; }

  .next-btn {
    width: 100%;
    margin-top: 1.2rem;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent2), #9b8ffc);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-family: 'Lato', Georgia, serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.15s;
    animation: fadeUp 0.3s ease;
  }
  .next-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  .result-screen {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    animation: fadeUp 0.5s ease;
  }
  .result-screen .medal { font-size: 56px; margin-bottom: 1rem; }
  .result-screen h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 26px;
    margin-bottom: 8px;
  }
  .result-screen .score {
    font-size: 52px;
    font-weight: 700;
    color: var(--accent);
    margin: 1rem 0;
    line-height: 1;
  }
  .result-screen .score span { font-size: 20px; color: var(--muted); }
  .result-screen .result-msg { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .result-stat { background: var(--surface2); border-radius: 10px; padding: 14px; }
  .result-stat .n { font-size: 24px; font-weight: 700; }
  .result-stat .l { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .result-stat.g .n { color: var(--green); }
  .result-stat.r .n { color: var(--red); }

  .round-result {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    animation: fadeUp 0.4s ease;
  }
  .round-result h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; margin-bottom: 8px; }
  .round-result .rs { font-size: 44px; font-weight: 700; color: var(--accent); margin: 12px 0; }
  .round-result p { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }

  .start-screen {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    animation: fadeUp 0.5s ease;
  }
  .start-screen .icon { font-size: 52px; margin-bottom: 1rem; }
  .start-screen h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 24px; margin-bottom: 10px; }
  .start-screen p { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; }
  .info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .info-box { background: var(--surface2); border-radius: 10px; padding: 14px 8px; }
  .info-box .n { font-size: 22px; font-weight: 700; color: var(--accent); }
  .info-box .l { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .big-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent2), #9b8ffc);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-family: 'Lato', Georgia, serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .big-btn:hover { opacity: 0.88; transform: translateY(-2px); }
  .big-btn.gold { background: linear-gradient(135deg, #b8922a, var(--accent)); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>
<div id="app">
  <div class="top-header">
    <div class="eyebrow">IBBC Ferraz – Centro</div>
    <h1>Simulado de Administração Eclesiástica</h1>
    <p>Princípios de administração, autoridade, legislação e governo da Igreja</p>
  </div>

  <div id="stats-bar" style="display:none">
    <div class="stat-box">
      <div class="num" id="s-rodada">1/7</div>
      <div class="lbl">Rodada</div>
    </div>
    <div class="stat-box">
      <div class="num" id="s-q">1/10</div>
      <div class="lbl">Questão</div>
    </div>
    <div class="stat-box acerto">
      <div class="num" id="s-acertos">0</div>
      <div class="lbl">Acertos</div>
    </div>
    <div class="stat-box erro">
      <div class="num" id="s-erros">0</div>
      <div class="lbl">Erros</div>
    </div>
  </div>

  <div id="progress-wrap" style="display:none">
    <div class="progress-labels">
      <span>Progresso</span>
      <span id="prog-label">0 / 25</span>
    </div>
    <div class="progress-track">
      <div id="prog"></div>
    </div>
  </div>

  <div id="main"></div>
</div>

<script>
const ROUND_NAMES = ["O Conceito de Administração","Igreja: Organismo, Organização e Autoridade","Aspectos Bíblicos e Planejamento","Gestão de Projetos — O Modelo de Neemias","Igreja como Pessoa Jurídica e Legislação","Formas de Governo Eclesiástico","Secretaria, Rol de Membros e Tesouraria"];

const QUESTIONS = [
[
{q:"O que é Administração?",
 opts:["É o processo de distribuir tarefas exclusivamente para líderes espirituais.","É a ciência de gerir um organismo retirando-o da inércia, com o menor desperdício de recursos (humanos, materiais, financeiros e de informação), visando ao aproveitamento ideal de 100%.","É apenas o controle financeiro de uma organização religiosa.","É a capacidade de uma pessoa exercer liderança sem planejamento prévio."],
 c:1, exp:"Administração é a ciência de gerir um organismo retirando-o da inércia, com o menor desperdício possível dos recursos disponíveis (humanos, materiais, financeiros e de informação), buscando 100% de aproveitamento."},

{q:"Qual a ordem correta das 5 funções (objetivos) do ciclo da Administração?",
 opts:["Prever → Organizar → Comandar → Coordenar → Avaliar","Organizar → Prever → Avaliar → Comandar → Coordenar","Avaliar → Comandar → Prever → Organizar → Coordenar","Comandar → Coordenar → Avaliar → Prever → Organizar"],
 c:0, exp:"A ordem correta do ciclo da administração é: 1. Prever → 2. Organizar → 3. Comandar → 4. Coordenar → 5. Avaliar."},

{q:"Prever (Lc 14.28-32) significa:",
 opts:["Reunir meios e recursos materiais e humanos, distribuídos racionalmente.","Preparar-se para o futuro com antecedência, elaborando programas de ação para os dias vindouros.","Manter o organismo em funcionamento homogêneo em suas diversas atividades.","Regular o trabalho em andamento e o acabado, aperfeiçoando métodos e resultados."],
 c:1, exp:"Prever (Lc 14.28-32) é preparar-se para o futuro com antecedência, elaborando programas de ação para os dias vindouros. Inclui: previsão, objetivos, programação, cronograma e orçamento."},

{q:"O que significa 'Organizar' na administração (Pv 18.9)?",
 opts:["Reunir meios e recursos humanos/materiais distribuídos racionalmente como um todo.","Determinar providências para que a organização funcione conforme norma vigente.","Manter o organismo em funcionamento homogêneo e integrado em suas atividades.","Regular o trabalho em andamento e acabado, aperfeiçoando métodos e resultados."],
 c:0, exp:"Organizar (Pv 18.9) = reunir meios e recursos humanos/materiais distribuídos racionalmente como um todo."},

{q:"O que significa 'Comandar' na administração (Pv 11.14)?",
 opts:["Determinar providências para que a organização funcione conforme norma vigente.","Reunir meios e recursos humanos/materiais distribuídos racionalmente como um todo.","Manter o organismo em funcionamento homogêneo e integrado em suas atividades.","Regular o trabalho em andamento e acabado, aperfeiçoando métodos e resultados."],
 c:0, exp:"Comandar (Pv 11.14) = determinar providências para que a organização funcione conforme a norma vigente."},

{q:"O que significa 'Coordenar' na administração (Ef 4.11-16)?",
 opts:["Manter o organismo em funcionamento homogêneo e integrado em suas atividades.","Reunir meios e recursos humanos/materiais distribuídos racionalmente.","Determinar providências para que a organização funcione conforme norma vigente.","Regular o trabalho em andamento e acabado, aperfeiçoando métodos e resultados."],
 c:0, exp:"Coordenar (Ef 4.11-16) = manter o organismo em funcionamento homogêneo e integrado em suas diversas atividades."},

{q:"O que significa 'Avaliar' na administração (Lc 19.11-27)?",
 opts:["Regular o trabalho em andamento e o acabado, aperfeiçoando métodos e resultados.","Reunir meios e recursos humanos/materiais distribuídos racionalmente.","Determinar providências para que a organização funcione conforme norma vigente.","Manter o organismo em funcionamento homogêneo e integrado."],
 c:0, exp:"Avaliar (Lc 19.11-27) = regular o trabalho em andamento e o acabado, aperfeiçoando métodos e resultados."}
],

[
{q:"Assinale a alternativa correta sobre Igreja organismo e Igreja organização:",
 opts:["A Igreja como organização deve sempre trabalhar para a Igreja organismo.","A Igreja como organismo deve sempre trabalhar para a Igreja organização.","Não há diferença, pois organismo e organização são a mesma coisa.","A Igreja como organização é independente do organismo espiritual."],
 c:0, exp:"A Igreja como organização deve sempre trabalhar PARA a Igreja organismo (o corpo de Cristo). A organização é meio, o organismo é o fim."},

{q:"Existem 3 níveis de autoridade reservados somente para Deus. Quais são eles?",
 opts:["Autoridade delegada, autoridade estipulada, autoridade funcional.","Autoridade pastoral, autoridade diaconal, autoridade presbiteral.","Autoridade soberana/imperial, autoridade da verdade, autoridade da consciência.","Autoridade dos costumes, autoridade funcional, autoridade estipulada."],
 c:2, exp:"Os 3 níveis reservados somente a Deus são: I. Autoridade Soberana/Imperial; II. Autoridade da Verdade; III. Autoridade da Consciência."},

{q:"Dos níveis de autoridade reservados ao homem, quais os listados na apostila?",
 opts:["Autoridade soberana, autoridade profética e autoridade apostólica.","Autoridade delegada, autoridade estipulada, autoridade dos costumes/tradição e autoridade funcional.","Autoridade da verdade, autoridade da consciência e autoridade delegada.","Autoridade imperial, autoridade funcional e autoridade estipulada."],
 c:1, exp:"Os níveis reservados ao homem são: Autoridade Delegada (dos cinco ministérios — Ef 4.11), Autoridade Estipulada (por contratos ou acordos legais), Autoridade dos Costumes/Tradição e Autoridade Funcional (interna, da competência ou capacidade)."},

{q:"Sobre a autoridade delegada, o que é correto afirmar segundo a apostila?",
 opts:["Ela nunca vai além de sua própria responsabilidade; aquele que cuida tem autoridade sobre o que é cuidado.","Ela é ilimitada e superior a qualquer outra autoridade.","Ela substitui completamente a autoridade de Deus.","Ela não tem nenhuma responsabilidade vinculada a ela."],
 c:0, exp:"A apostila afirma: 'A autoridade delegada nunca vai além de sua própria responsabilidade. Aquele que cuida tem autoridade sobre o que é cuidado.' (seção 3.2)."}
],

[
{q:"Qual das alternativas apresenta três exemplos bíblicos corretos de princípios de administração, citados na apostila?",
 opts:["Salomão (construção do templo), João (Apocalipse), Paulo (epístolas).","Moisés (travessia do Mar Vermelho), Elias (confronto no Carmelo), Daniel (cativeiro).","Jetro (conselho a Moisés — Êx 18.13-27), Davi (organização dos sacerdotes — 1Cr 24) e Noé (construção da Arca — dados completos de Deus).","Abraão (chamado), Jacó (missão), José (sonhos)."],
 c:2, exp:"A apostila cita: Jetro (conselho a Moisés — Êx 18.13-27), Davi (organização dos sacerdotes — 1Cr 24) e Noé (Deus deu instruções completas para a construção da Arca e do Tabernáculo)."},

{q:"Complete: 'Visão é uma ___ positiva do seu futuro preferível. É uma imagem do que você deseja fazer, uma estaca plantada no seu futuro.'",
 opts:["Fotografia","Ideia","Suposição","Lembrança"],
 c:0, exp:"'Visão é uma fotografia positiva do seu futuro preferível. É uma imagem do que você deseja fazer, uma estaca plantada no seu futuro.' (seção 4.2 da apostila)."},

{q:"Sobre os alvos (metas), a apostila usa o critério SMART. O que significa a sigla SMART?",
 opts:["Simples, Mensurável, Atingível, Realista, Testado.","Specific (Específico), Measurable (Mensurável), Attainable (Atingível), Relevant (Relevante), Temporal (Temporal).","Sistemático, Modular, Avaliável, Razoável, Técnico.","Sustentável, Mensurável, Autônomo, Rigoroso, Transparente."],
 c:1, exp:"SMART: Specific (Específico), Measurable (Mensurável), Attainable (Atingível), Relevant (Relevante), Temporal (Temporal). São os critérios para alvos bem definidos."}
],

[
{q:"Qual era a função de Neemias antes de ir a Jerusalém, e qual era sua missão lá?",
 opts:["Era copeiro do rei da Babilônia e foi reconstruir os muros de Jerusalém.","Era sacerdote do templo e foi reorganizar o culto em Jerusalém.","Era escriba e foi transcrever as Escrituras em Jerusalém.","Era profeta do rei e foi anunciar juízo sobre a cidade."],
 c:0, exp:"Neemias era o copeiro do rei da Babilônia, organizado e sensível às necessidades ao seu redor. Foi usar suas habilidades administrativas para reconstruir os muros de Jerusalém."},

{q:"O que são 'Princípios Operacionais', segundo a apostila (seção 5.2.3)?",
 opts:["As regras do jogo — máximas universais, códigos de honra, princípios morais, axiomas inegáveis, bom senso, lições anteriores e expectativas da equipe.","Apenas as leis civis aplicadas à Igreja.","Regras criadas exclusivamente pelo pastor a cada reunião.","Normas que mudam a cada projeto, sem nenhuma base fixa."],
 c:0, exp:"Essa é a definição literal de Princípios Operacionais na apostila (seção 5.2.3): 'as regras do jogo' — máximas universais, códigos de honra, princípios morais, axiomas inegáveis, bom senso, lições anteriores e expectativas da equipe."},

{q:"Os inimigos de Neemias usaram quatro argumentos para tentar parar a obra. Quais são eles?",
 opts:["Ameaça física, suborno, falsa profecia, boato.","Divisão interna, falta de recursos, abandono dos trabalhadores, pressão do rei.","Argumento legal de rebeldia (2.19; 6.6), escarnecimento (4.1), gerando confusão (4.8) e promovendo conversa inútil e traição (6.2).","Greve dos trabalhadores, ameaça de morte, corrupção dos líderes, falsa paz."],
 c:2, exp:"Os quatro argumentos dos inimigos: (a) Argumento legal de rebeldia — 2.19; 6.6; (b) Escarnecendo — 4.1; (c) Gerando confusão — 4.8; (d) Promovendo conversa inútil e traição — 6.2."}
],

[
{q:"Qual é o instrumento mais importante da legislação brasileira, que nenhuma outra lei pode contrariar?",
 opts:["A Constituição Federal de 1988.","O Código Civil — Lei nº 10.406 de 10/01/2002.","O Estatuto Social da Igreja.","O Regimento Interno da denominação."],
 c:0, exp:"A Constituição Federal de 1988 é o instrumento jurídico mais importante da legislação brasileira — 'lei maior' do país, que nenhuma outra lei pode contrariar."},

{q:"Qual a ordem hierárquica correta da legislação que influi na vida da Igreja, da mais importante para a menos?",
 opts:["Constituição Federal de 1988 → Código Civil → Estatuto Social da Igreja → Regimento Interno → Usos e Costumes/Tradição","Estatuto Social → Regimento Interno → Constituição Federal → Código Civil → Usos e Costumes","Usos e Costumes → Regimento Interno → Estatuto Social → Código Civil → Constituição Federal","Código Civil → Constituição Federal → Usos e Costumes → Estatuto Social → Regimento Interno"],
 c:0, exp:"Ordem hierárquica: 1. Constituição Federal → 2. Código Civil → 3. Estatuto Social → 4. Regimento Interno → 5. Usos e Costumes/Tradição. (Seção 6.1)."},

{q:"Quais são as condições para a Igreja gozar de imunidade tributária, segundo a apostila?",
 opts:["Não ter fins lucrativos, não distribuir renda aos membros da diretoria e não cobrar ingressos ou dividendos econômicos.","Apenas estar registrada em cartório de pessoas jurídicas.","Ter mais de 100 membros filiados ativos.","Pagar uma taxa anual de isenção ao governo federal."],
 c:0, exp:"A apostila lista três condições para imunidade tributária: (a) sem fins lucrativos; (b) não distribui renda/dividendos aos membros da diretoria; (c) não cobra ingressos ou dividendos econômicos."}
],

[
{q:"O que caracteriza o Sistema Monárquico de governo eclesiástico?",
 opts:["O governo está nas mãos de uma só pessoa; o fundador ou o pastor exerce a função de Bispo ou Arcebispo.","O governo está nas mãos dos pastores ou bispos; o oficial principal é o presbítero.","A congregação é independente e autônoma; cada membro tem voto igual.","O presidente da convenção exerce autoridade sobre as igrejas locais, com hierarquia episcopal."],
 c:0, exp:"Monárquico = governo de uma só pessoa (pastor/fundador como Bispo)."},

{q:"O que caracteriza o Sistema Presbiteral ou Oligárquico de governo eclesiástico?",
 opts:["O governo está nas mãos dos pastores ou bispos; crê no governo dos presbíteros; o oficial principal é o presbítero.","O governo está nas mãos de uma só pessoa, como Bispo ou Arcebispo.","A congregação é independente e autônoma; cada membro tem voto igual.","Há hierarquia episcopal, com Bispos sobre as igrejas locais."],
 c:0, exp:"Presbiteral = governo dos presbíteros."},

{q:"O que caracteriza o Sistema Congregacional de governo eclesiástico?",
 opts:["A congregação é independente e autônoma; cada membro tem voto igual; a Assembleia Geral é a autoridade máxima.","O governo está nas mãos de uma só pessoa, como Bispo.","O governo está nas mãos dos presbíteros.","Há hierarquia episcopal, com Bispos sobre as igrejas locais."],
 c:0, exp:"Congregacional = congregação autônoma com voto igual para todos."},

{q:"A Igreja O Brasil Para Cristo (OBPC) segue qual sistema de governo eclesiástico, segundo o organograma apresentado na apostila?",
 opts:["Sistema Monárquico — um único fundador governa todas as igrejas.","Sistema Episcopal/Prelático — com Conselho Nacional, Convenção Estadual/Regional, Igreja Local e Congregações.","Sistema Congregacional — cada igreja local é completamente autônoma.","Sistema Presbiteral — governado exclusivamente por presbíteros eleitos."],
 c:1, exp:"O organograma da OBPC mostra: Conselho Nacional → Convenção Estadual/Regional → Igreja Local/Regional → Congregações. Esse modelo reflete o sistema Episcopal/Prelático, com autoridade hierárquica da denominação."}
],

[
{q:"O que é o Rol Ativo, segundo a apostila?",
 opts:["O que está em vigor no momento com os membros filiados; de uso exclusivo da secretaria e diretoria, não acessível a qualquer pessoa por conter informações confidenciais.","Uma lista pública afixada no mural da igreja para qualquer visitante consultar.","O registro apenas dos membros falecidos da congregação.","Um documento que qualquer membro pode solicitar livremente, sem restrição."],
 c:0, exp:"O Rol Ativo contém dados sigilosos dos membros filiados e deve ser guardado pela secretaria e diretoria, não sendo acessível a qualquer pessoa."}
]
];

const TOTAL_Q = 25;
const N_ROUNDS = 7;

let round = 0, qIdx = 0, answered = false;
let totalAcertos = 0, totalErros = 0;
let roundAcertos = 0;
let qDoneBefore = 0; // questions completed in previous rounds
const LETTERS = ['A','B','C','D'];

function getEl(id){ return document.getElementById(id); }

function roundSize(r){ return QUESTIONS[r].length; }

function updateStats(){
  const totalQ = qDoneBefore + qIdx;
  const pct = totalQ / TOTAL_Q * 100;
  getEl('prog').style.width = pct + '%';
  getEl('prog-label').textContent = totalQ + ' / ' + TOTAL_Q;
  getEl('s-rodada').textContent = (round+1)+'/'+N_ROUNDS;
  getEl('s-q').textContent = (qIdx+1)+'/'+roundSize(round);
  getEl('s-acertos').textContent = totalAcertos;
  getEl('s-erros').textContent = totalErros;
}

function showHUD(visible){
  getEl('stats-bar').style.display = visible ? 'grid' : 'none';
  getEl('progress-wrap').style.display = visible ? 'block' : 'none';
}

function showStart(){
  showHUD(false);
  getEl('main').innerHTML = `
    <div class="start-screen">
      <div class="icon">🏛️</div>
      <h2>Simulado de Administração Eclesiástica</h2>
      <p>Princípios de administração, autoridade, legislação e governo da Igreja</p>
      <div class="info-grid">
        <div class="info-box"><div class="n">${N_ROUNDS}</div><div class="l">Rodadas</div></div>
        <div class="info-box"><div class="n">${TOTAL_Q}</div><div class="l">Questões</div></div>
        <div class="info-box"><div class="n">~16</div><div class="l">Minutos</div></div>
      </div>
      <button class="big-btn" onclick="startQuiz()">Começar o Simulado →</button>
    </div>`;
}

function startQuiz(){
  round = 0; qIdx = 0; totalAcertos = 0; totalErros = 0; roundAcertos = 0; qDoneBefore = 0;
  showHUD(true);
  showQuestion();
}

function showQuestion(){
  answered = false;
  updateStats();
  const q = QUESTIONS[round][qIdx];
  const rSize = roundSize(round);

  const optsHTML = q.opts.map((o,i) => `
    <button class="opt-btn" id="opt${i}" onclick="answer(${i})">
      <span class="letter">${LETTERS[i]}</span>
      <span>${o}</span>
    </button>`).join('');

  getEl('main').innerHTML = `
    <div class="q-card">
      <div class="round-badge">Rodada ${round+1} — ${ROUND_NAMES[round]}</div>
      <div class="q-num">Questão ${qIdx+1} de ${rSize}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      <div id="feedback"></div>
    </div>`;
}

function answer(idx){
  if(answered) return;
  answered = true;
  const q = QUESTIONS[round][qIdx];
  const correct = idx === q.c;
  if(correct){ totalAcertos++; roundAcertos++; }
  else { totalErros++; }
  updateStats();

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  btns[idx].classList.add(correct ? 'correct' : 'wrong');
  if(!correct) btns[q.c].classList.add('reveal-correct');

  const icon = correct ? '✓ Correto!' : '✗ Incorreto';
  const cls = correct ? 'ok' : 'err';
  const rSize = roundSize(round);
  getEl('feedback').innerHTML = `
    <div class="feedback-box ${cls}">
      <strong>${icon}</strong>
      ${q.exp}
    </div>
    <button class="next-btn" onclick="nextQuestion()">
      ${qIdx < rSize-1 ? 'Próxima questão →' : 'Ver resultado da rodada →'}
    </button>`;
}

function nextQuestion(){
  const rSize = roundSize(round);
  if(qIdx < rSize-1){
    qIdx++;
    showQuestion();
  } else {
    showRoundResult();
  }
}

function showRoundResult(){
  const rSize = roundSize(round);
  const pct = Math.round(roundAcertos / rSize * 100);
  let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
  let msg = pct >= 80 ? 'Excelente! Você domina este tema.' : pct >= 60 ? 'Bom resultado! Continue estudando.' : 'Estude mais este conteúdo antes de prosseguir.';

  getEl('main').innerHTML = `
    <div class="round-result">
      <div style="font-size:48px;margin-bottom:12px">${emoji}</div>
      <h2>Resultado da Rodada ${round+1}</h2>
      <div class="rs">${roundAcertos}/${rSize}</div>
      <p>${pct}% de acertos — ${msg}</p>
      ${round < N_ROUNDS-1 ? `<button class="big-btn" onclick="nextRound()">Próxima Rodada →</button>` : `<button class="big-btn gold" onclick="showFinalResult()">Ver Resultado Final 🏁</button>`}
    </div>`;
}

function nextRound(){
  qDoneBefore += roundSize(round);
  round++;
  qIdx = 0;
  roundAcertos = 0;
  showQuestion();
}

function showFinalResult(){
  const pct = Math.round(totalAcertos / TOTAL_Q * 100);
  let medal = pct >= 90 ? '🥇' : pct >= 75 ? '🥈' : pct >= 60 ? '🥉' : '📚';
  let msg = pct >= 90 ? 'Parabéns! Você tem um domínio excelente do conteúdo. Está pronto para a prova!'
    : pct >= 75 ? 'Muito bom! Revise os tópicos em que errou e você estará pronto.'
    : pct >= 60 ? 'Bom esforço! Recomendamos reler os capítulos com mais erros.'
    : 'Continue estudando! Releia o material com calma e refaça o simulado.';

  getEl('prog').style.width = '100%';
  getEl('prog-label').textContent = TOTAL_Q + ' / ' + TOTAL_Q;
  getEl('s-rodada').textContent = N_ROUNDS+'/'+N_ROUNDS;
  getEl('s-acertos').textContent = totalAcertos;
  getEl('s-erros').textContent = totalErros;

  getEl('main').innerHTML = `
    <div class="result-screen">
      <div class="medal">${medal}</div>
      <h2>Simulado Concluído!</h2>
      <div class="score">${totalAcertos}<span>/${TOTAL_Q}</span></div>
      <div class="result-grid">
        <div class="result-stat g"><div class="n">${totalAcertos}</div><div class="l">Acertos</div></div>
        <div class="result-stat r"><div class="n">${totalErros}</div><div class="l">Erros</div></div>
        <div class="result-stat"><div class="n">${pct}%</div><div class="l">Aproveitamento</div></div>
        <div class="result-stat"><div class="n">${N_ROUNDS}</div><div class="l">Rodadas</div></div>
      </div>
      <div class="result-msg">${msg}</div>
      <button class="big-btn" onclick="location.reload()" style="margin-bottom:12px">Refazer o Simulado 🔄</button>
    </div>`;
}

showStart();
</script>

</html>
