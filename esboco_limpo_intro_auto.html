<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Esboço de Sermão — Pastor Sérgio Costa</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:#3A3028;display:flex;flex-direction:column;align-items:center;min-height:100vh;}

.toolbar{width:100%;background:#1A1208;padding:6px 14px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;position:sticky;top:0;z-index:100;border-bottom:1px solid #4A3728;}
.tlabel{color:#C9A84C;font-family:'EB Garamond',serif;font-size:14px;font-weight:600;margin-right:2px;white-space:nowrap;}
.tb{background:transparent;border:1px solid #4A3728;color:#C9A84C;padding:3px 9px;border-radius:3px;cursor:pointer;font-size:12px;font-family:'Crimson Pro',serif;}
.tb:hover{background:#8B6914;color:#1A1208;}
select.tb{background:#2C1F0E;}
.sep{width:1px;height:18px;background:#4A3728;flex-shrink:0;}
.pbtn{margin-left:auto;background:#8B6914;color:#FEF9EF;border:none;padding:5px 14px;border-radius:3px;font-family:'EB Garamond',serif;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;}
.pbtn:hover{background:#C9A84C;color:#1A1208;}
.color-group{display:flex;align-items:center;gap:3px;}
.color-group label{color:#C9A84C;font-size:11px;white-space:nowrap;}
.swatch{width:20px;height:20px;border-radius:3px;border:2px solid #4A3728;cursor:pointer;flex-shrink:0;transition:transform .1s;display:inline-block;}
.swatch:hover{transform:scale(1.25);border-color:#C9A84C;}
input[type=color].tb-color{width:24px;height:24px;padding:1px;background:transparent;border:1px solid #4A3728;border-radius:3px;cursor:pointer;}

.wrap{padding:20px;display:flex;flex-direction:column;align-items:center;}
.page{background:#FDFAF3;width:794px;min-height:1000px;padding:15mm 18mm 14mm;border:1px solid #ccc;box-shadow:0 6px 30px rgba(0,0,0,.5);}

.hdr{text-align:center;margin-bottom:10px;}
.church{font-size:9pt;color:#6B3A1F;font-weight:600;letter-spacing:.3px;margin-bottom:4px;}
.title{font-family:'EB Garamond',serif;font-size:20pt;font-weight:600;color:#1A1208;outline:none;min-height:24px;line-height:1.2;}
.meta{font-size:9.5pt;color:#555;outline:none;min-height:14px;margin-top:4px;}

.screen-label{display:block;font-size:8pt;font-weight:600;color:#8B6914;letter-spacing:1.5px;text-transform:uppercase;margin:10px 0 4px;}

.row{display:grid;grid-template-columns:125px 1fr;gap:2px 8px;align-items:start;margin-bottom:5px;}
.lbl{font-size:9pt;font-weight:600;color:#4A3728;text-align:right;padding-top:2px;}
.val{
  font-size:10.5pt;color:#1A1208;
  outline:none;
  min-height:22px;
  line-height:1.6;
  border:1px solid #D4B896;
  border-radius:3px;
  padding:3px 6px;
  resize:none;
  overflow:hidden;
  white-space:pre-wrap;
  word-break:break-word;
}
.val:focus{background:#FFFEF5;border-color:#8B6914;}

/* ── PAINEL DE INTRODUÇÃO AUTOMÁTICA ── */
.intro-panel{
  background:#FFF8E8;
  border:1.5px solid #C9A84C;
  border-radius:5px;
  padding:10px 12px;
  margin-bottom:10px;
}
.intro-panel-title{
  font-family:'EB Garamond',serif;
  font-size:11pt;font-weight:600;
  color:#6B3A1F;
  margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.intro-panel-title span.badge{
  font-size:7.5pt;background:#C9A84C;color:#1A1208;
  border-radius:3px;padding:1px 6px;letter-spacing:.5px;
  font-family:'Crimson Pro',serif;font-weight:600;
}
.intro-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.intro-row label{font-size:9pt;color:#4A3728;font-weight:600;white-space:nowrap;min-width:100px;text-align:right;}
.intro-input{
  flex:1;min-width:180px;
  border:1px solid #D4B896;border-radius:3px;
  padding:4px 7px;font-family:'Crimson Pro',serif;font-size:10pt;
  background:#FFFEF5;color:#1A1208;outline:none;
}
.intro-input:focus{border-color:#8B6914;}
.intro-select{
  flex:1;min-width:180px;
  border:1px solid #D4B896;border-radius:3px;
  padding:4px 7px;font-family:'Crimson Pro',serif;font-size:10pt;
  background:#FFFEF5;color:#1A1208;outline:none;cursor:pointer;
}
.gbtn{
  background:#6B3A1F;color:#FEF9EF;border:none;
  padding:6px 16px;border-radius:3px;
  font-family:'EB Garamond',serif;font-size:12pt;font-weight:600;
  cursor:pointer;white-space:nowrap;
}
.gbtn:hover{background:#8B5A2B;}
.gbtn:active{background:#4A2710;}
.intro-feedback{
  font-size:9pt;color:#8B6914;font-style:italic;
  margin-top:4px;min-height:14px;
}

/* piscada no campo preenchido */
@keyframes filled-flash {
  0%{background:#FFF8C0;}50%{background:#FFF8C0;}100%{background:transparent;}
}
.just-filled{animation:filled-flash .9s ease;}

.title:empty::before{content:'Título do Sermão';color:#ccc;font-style:italic;}
.meta:empty::before{content:'Texto: Livro 0:0  |  Pregador: Nome  |  Data: __/__/__';color:#ccc;}
.val:empty::before{content:'...';color:#ccc;}

.pt{margin-top:10px;padding:8px 10px;border-left:3px solid #D4B896;background:#FEF9EF;}
.pt-num{font-size:8pt;font-weight:600;color:#8B6914;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.pt-title{
  font-family:'EB Garamond',serif;font-size:13pt;font-weight:600;color:#1A1208;
  outline:none;min-height:22px;
  border:1px solid #D4B896;border-radius:3px;
  padding:3px 6px;margin-bottom:7px;width:100%;display:block;
  white-space:pre-wrap;word-break:break-word;
}
.pt-title:focus{background:#FFFEF5;border-color:#8B6914;}
.pt-title:empty::before{content:'Título do ponto...';color:#ccc;font-style:italic;}

.conc{margin-top:12px;}
.conc-text{
  font-size:10.5pt;color:#1A1208;outline:none;
  min-height:50px;line-height:1.6;
  border:1px solid #D4B896;border-radius:3px;padding:4px 6px;
  white-space:pre-wrap;word-break:break-word;width:100%;display:block;
}
.conc-text:focus{background:#FFFEF5;border-color:#8B6914;}
.conc-text:empty::before{content:'Resumo, apelo final e oração...';color:#ccc;}

.ftr{text-align:center;margin-top:14px;font-size:8pt;color:#888;}

.btn-add{display:block;width:100%;margin-top:8px;padding:7px;background:transparent;border:1px dashed #D4B896;color:#8B6914;font-family:'EB Garamond',serif;font-size:13px;cursor:pointer;text-align:center;}
.btn-add:hover{background:#F5EDD3;}
.btn-del{float:right;background:transparent;border:none;color:#bbb;font-size:10px;cursor:pointer;padding:1px 5px;}
.btn-del:hover{color:#8B2020;}

@media print {
  @page{size:A4;margin:8mm 6mm 8mm 6mm;}
  body{background:#fff !important;}
  .toolbar,.btn-add,.btn-del,.screen-label,.pt-num,.church,.ftr,.intro-panel{display:none !important;}
  .title:empty,.meta:empty,.val:empty,.pt-title:empty,.conc-text:empty{display:none !important;}
  .lbl{display:none !important;}
  .row{grid-template-columns:1fr !important;}
  .wrap{padding:0;}
  .page{width:100% !important;min-height:auto !important;border:none !important;box-shadow:none !important;padding:0 !important;background:#fff !important;}
  .val,.pt-title,.conc-text{border:none !important;background:none !important;padding:0 !important;border-radius:0 !important;}
  .pt{border-left:none !important;padding:2px 0 !important;margin-top:5px !important;background:none !important;}
  .hdr{margin-bottom:5px !important;}
  .conc{margin-top:7px !important;}
  .row{margin-bottom:1px !important;}
  .title:empty::before,.meta:empty::before,.val:empty::before,.pt-title:empty::before,.conc-text:empty::before{content:none !important;}
  [contenteditable]:hover,[contenteditable]:focus{background:none !important;border:none !important;}
}
</style>
</head>

/* ─────────────────────────────────────────────────────────
   FUNÇÃO PRINCIPAL DE GERAÇÃO
   ───────────────────────────────────────────────────────── */
function gerarIntroducao(){
  var ref   = document.getElementById('ref-input').value.trim();
  var enf   = document.getElementById('enfase-select').value;
  var tom   = document.getElementById('tom-select').value;
  var fb    = document.getElementById('intro-feedback');

  if(!ref){
    fb.style.color='#8B2020';
    fb.textContent='⚠ Por favor, informe a referência bíblica antes de gerar.';
    return;
  }

  /* Parse da referência */
  var parsed = parseRef(ref);

  /* Contexto do livro */
  var ctxKey = parsed.livroKey;
  var contextoTexto = CONTEXTO_LIVRO[ctxKey] || 
    'Este trecho das Escrituras Sagradas está inserido em um livro de profunda relevância para a fé cristã. Ao nos aproximarmos do texto de ' + parsed.livroNome + ', fazemos isso reconhecendo que toda a Escritura é inspirada por Deus e útil para o ensino, para a repreensão, para a correção e para a instrução na justiça (2Tm 3:16).';

  /* Contexto adicional com o versículo específico */
  var ctxAdicional = parsed.cap ? 
    '\n\nNo capítulo ' + parsed.cap + (parsed.vers ? ', versículo' + (parsed.versEnd ? 's ' + parsed.vers + ' ao ' + parsed.versEnd : ' ' + parsed.vers) : '') + ', somos confrontados com uma verdade específica que merece nossa total atenção e meditação.' : '';

  /* Ligação ao tema */
  var ligsArr = LIGACAO_ENFASE[enf] || LIGACAO_ENFASE['livre'];
  var ligIdx  = Math.floor(Math.random() * ligsArr.length);
  var ligTexto = ABERTURA_TOM[tom] + '\n\n' + ligsArr[ligIdx];

  /* Preenche os campos */
  var campoCtx = document.getElementById('campo-contexto');
  var campoLig = document.getElementById('campo-ligacao');

  campoCtx.textContent = contextoTexto + ctxAdicional;
  campoLig.textContent = ligTexto;

  /* Flash de confirmação */
  flash(campoCtx);
  flash(campoLig);

  /* Atualiza meta se estiver vazio */
  var metaEl = document.getElementById('sermon-meta');
  if(!metaEl.textContent.trim() || metaEl.textContent.includes('__')){
    metaEl.textContent = 'Texto: ' + ref + '  |  Pregador: Pastor Sérgio Costa  |  Data: ___/___/______';
  }

  fb.style.color='#1A6B2A';
  fb.textContent='✔ Introdução gerada com sucesso! Edite os campos à vontade.';
  setTimeout(function(){ fb.textContent=''; }, 4000);
}

/* ─────────────────────────────────────────────────────────
   PARSE DA REFERÊNCIA BÍBLICA
   Aceita formatos: João 3:16 | Jo 3:16 | Sl 23:1-3 | Rm 8:28
   ───────────────────────────────────────────────────────── */
function parseRef(str){
  var s = str.trim();

  /* remove acentos para comparação */
  function norm(t){ return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

  /* Detecta número de livro no início (1Jo, 2Pe etc.) */
  var m = s.match(/^([123])\s*([A-Za-zÀ-ÖØ-öø-ÿ]+)\s*(\d+)?:?(\d+)?-?(\d+)?/);
  var numLivro = '';
  var livro = '';
  if(m){
    numLivro = m[1];
    livro    = m[2];
  } else {
    var m2 = s.match(/^([A-Za-zÀ-ÖØ-öø-ÿ]+)\s*(\d+)?:?(\d+)?-?(\d+)?/);
    if(m2) livro = m2[1];
  }

  var cap='', vers='', versEnd='';
  var capMatch = s.match(/:?(\d+):(\d+)-?(\d+)?/);
  if(capMatch){
    cap = capMatch[1]; vers = capMatch[2]; versEnd = capMatch[3]||'';
  } else {
    var capOnly = s.match(/\s+(\d+)$/);
    if(capOnly) cap = capOnly[1];
  }

  var livroKey = norm(numLivro ? numLivro + livro : livro);
  var livroNome = numLivro ? numLivro + ' ' + livro : livro;

  return {livroKey:livroKey, livroNome:livroNome, cap:cap, vers:vers, versEnd:versEnd};
}

/* Flash verde nos campos preenchidos */
function flash(el){
  el.classList.remove('just-filled');
  void el.offsetWidth;
  el.classList.add('just-filled');
}

/* ─────────────────────────────────────────────────────────
   TOOLBAR — FORMATAÇÃO
   ───────────────────────────────────────────────────────── */
var savedRange = null;
document.addEventListener('mousedown', function(e){
  if(e.target.closest('.toolbar')) return;
  savedRange = null;
});
document.addEventListener('selectionchange', function(){
  var sel = window.getSelection();
  if(sel && sel.rangeCount > 0 && !sel.isCollapsed){
    var range = sel.getRangeAt(0);
    if(document.getElementById('page').contains(range.commonAncestorContainer)){
      savedRange = range.cloneRange();
    }
  }
});
function restoreSelection(){
  if(!savedRange) return false;
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedRange);
  return true;
}
function applyFmt(cmd){ restoreSelection(); document.execCommand(cmd, false, null); }
document.getElementById('fsize').addEventListener('change', function(){
  var sz = this.value; if(!sz) return;
  restoreSelection(); wrapSelection('font-size:'+sz); this.value='';
});
function applyColor(hex){ restoreSelection(); if(!wrapSelection('color:'+hex)) document.execCommand('foreColor',false,hex); document.getElementById('customColor').value=hex; }
function applyHighlight(hex){ restoreSelection(); wrapSelection('background-color:'+hex); }
function wrapSelection(styleStr){
  var sel = window.getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed) return false;
  var range = sel.getRangeAt(0);
  var frag = range.extractContents();
  var span = document.createElement('span');
  span.style.cssText = styleStr;
  span.appendChild(frag);
  range.insertNode(span);
  var newRange = document.createRange();
  newRange.selectNodeContents(span);
  sel.removeAllRanges(); sel.addRange(newRange);
  savedRange = newRange.cloneRange();
  return true;
}

   ───────────────────────────────────────────────────────── */
var n=0;
function add(){
  n++;
  var list=document.getElementById('pts');
  var d=document.createElement('div');
  d.className='pt';
  d.innerHTML=
    '<div class="pt-num">Ponto '+n+
    ' <button class="btn-del" onclick="this.closest(\'.pt\').remove();renum()">✕ remover</button></div>'+
    '<div class="pt-title" contenteditable="true"></div>'+
    '<div class="row"><span class="lbl">Versículo:</span><div class="val" contenteditable="true"></div></div>'+
    '<div class="row"><span class="lbl">Contextualização:</span><div class="val" contenteditable="true"></div></div>'+
    '<div class="row"><span class="lbl">Explicação:</span><div class="val" contenteditable="true"></div></div>'+
    '<div class="row"><span class="lbl">Aplicação:</span><div class="val" contenteditable="true"></div></div>';
  list.appendChild(d);
  d.querySelector('.pt-title').focus();
}
function renum(){
  var pts=document.querySelectorAll('.pt');
  pts.forEach(function(b,i){ b.querySelector('.pt-num').firstChild.textContent='Ponto '+(i+1)+' '; });
  n=pts.length;
}

/* Permite pressionar Enter no campo de referência */
document.addEventListener('DOMContentLoaded', function(){
  add(); add();
  document.getElementById('ref-input').addEventListener('keydown', function(e){
    if(e.key==='Enter'){ e.preventDefault(); gerarIntroducao(); }
  });
});
